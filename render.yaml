# Configuración declarativa de Render.
# Cuando conectes este repo a Render, va a leer este archivo y crear
# automáticamente el servicio web + base de datos PostgreSQL.

services:
  - type: web
    name: dorismon-api
    runtime: python
    region: oregon              # más cerca de RD entre las opciones gratis
    plan: free                  # tier gratuito (se duerme tras 15 min sin uso)
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dorismon-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true     # Render genera una clave segura automáticamente
      - key: REDIS_URL
        value: memory://
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: BOOKING_HOLD_MINUTES
        value: "5"
      - key: DEFAULT_TIMEZONE
        value: America/Santo_Domingo

databases:
  - name: dorismon-db
    plan: free                  # PostgreSQL gratuito 90 días, después $7/mes
    databaseName: dorismon
    user: dorismon
